name: skeleton_shimmer
description: >-
  Shimmer loading effect and skeleton loaders for Flutter. API-compatible with
  the shimmer package, with skeleton placeholder widgets and reduced-motion
  accessibility.
version: 0.2.0
repository: https://github.com/Yusufihsangorgel/skeleton_shimmer

topics:
  - shimmer
  - skeleton
  - loading
  - placeholder
  - animation

screenshots:
  - description: >-
      A skeleton feed with the shimmer sweeping across it, then the
      loaded content taking its place.
    path: doc/demo.gif

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
