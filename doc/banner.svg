<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#E2E8F0" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="400" fill="#0B1220"/>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- Motif: three skeleton bars with a diagonal shimmer sweep -->
  <g stroke="#38BDF8" stroke-width="3" fill="none">
    <rect x="860" y="100" width="240" height="32" rx="16"/>
    <rect x="860" y="160" width="180" height="32" rx="16"/>
    <rect x="860" y="220" width="210" height="32" rx="16"/>
    <!-- shimmer strip sweeping across the bars -->
    <polygon points="990,86 1036,86 978,266 932,266"
             fill="#38BDF8" fill-opacity="0.3" stroke="none"/>
  </g>

  <!-- Wordmark -->
  <text x="64" y="300" font-family="Menlo, 'DejaVu Sans Mono', monospace"
        font-size="64" font-weight="bold" fill="#E2E8F0">skeleton_shimmer</text>
  <text x="64" y="344" font-family="Menlo, 'DejaVu Sans Mono', monospace"
        font-size="24" fill="#94A3B8">Shimmer loading with skeleton placeholders</text>
</svg>
